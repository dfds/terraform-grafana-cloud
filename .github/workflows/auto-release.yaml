name: Auto release on merge

on:
  push:
    branches: [master, main]
    paths-ignore:
      - .github/**
      - "**/*.md"
      - .gitignore
      - .pre-commit-config.yaml
      - .tflint.hcl
      - LICENSE
      - renovate.json

jobs:
  auto-release:
    uses: dfds/shared-workflows/.github/workflows/automation-auto-release.yml@v2.0.1
